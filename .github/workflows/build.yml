name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare build metadata
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          BUILD_NUMBER=$(printf '%s' "$TAG_NAME" | sed -n 's/^v1\.0-build\([0-9][0-9]*\)$/\1/p')
          if [ -z "$BUILD_NUMBER" ]; then
            BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          fi
          printf 'VERSION = "1.0"\nBUILD_NUMBER = "%s"\nRELEASE_TAG = "%s"\n' "$BUILD_NUMBER" "$TAG_NAME" > build_info.py

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "flet==0.28.3" "flet-cli==0.28.3" pyinstaller
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Create icon
        run: |
          ICON_ICNS="$RUNNER_TEMP/RimeoAgent.icns"
          ICONSET=$(mktemp -d)/RimeoAgent.iconset
          mkdir -p "$ICONSET"
          sips -z 16   16   rimeo1024.png --out "$ICONSET/icon_16x16.png"       >/dev/null
          sips -z 32   32   rimeo1024.png --out "$ICONSET/icon_16x16@2x.png"    >/dev/null
          sips -z 32   32   rimeo1024.png --out "$ICONSET/icon_32x32.png"       >/dev/null
          sips -z 64   64   rimeo1024.png --out "$ICONSET/icon_32x32@2x.png"    >/dev/null
          sips -z 128  128  rimeo1024.png --out "$ICONSET/icon_128x128.png"     >/dev/null
          sips -z 256  256  rimeo1024.png --out "$ICONSET/icon_128x128@2x.png"  >/dev/null
          sips -z 256  256  rimeo1024.png --out "$ICONSET/icon_256x256.png"     >/dev/null
          sips -z 512  512  rimeo1024.png --out "$ICONSET/icon_256x256@2x.png"  >/dev/null
          sips -z 512  512  rimeo1024.png --out "$ICONSET/icon_512x512.png"     >/dev/null
          sips -z 1024 1024 rimeo1024.png --out "$ICONSET/icon_512x512@2x.png"  >/dev/null
          iconutil -c icns "$ICONSET" -o "$ICON_ICNS"
          echo "ICON_ICNS=$ICON_ICNS" >> "$GITHUB_ENV"

      - name: Build
        run: |
          flet pack run.py \
            -y \
            --name RimeoAgent \
            --product-name "Rimeo Agent" \
            --bundle-id app.rimeo.agent \
            --icon "$ICON_ICNS" \
            --add-data "rimeo1024.png:." \
            --hidden-import "uvicorn.logging" \
            --hidden-import "uvicorn.loops" \
            --hidden-import "uvicorn.loops.auto" \
            --hidden-import "uvicorn.protocols" \
            --hidden-import "uvicorn.protocols.http" \
            --hidden-import "uvicorn.protocols.http.auto" \
            --hidden-import "uvicorn.protocols.websockets" \
            --hidden-import "uvicorn.protocols.websockets.auto" \
            --hidden-import "uvicorn.lifespan" \
            --hidden-import "uvicorn.lifespan.on" \
            --hidden-import "fastapi" \
            --hidden-import "pydantic_settings" \
            --pyinstaller-build-args="--additional-hooks-dir=build/hooks"

      - name: Package
        run: |
          cd dist
          if [ -d "RimeoAgent.app" ]; then
            zip -r RimeoAgent_mac_arm64.zip RimeoAgent.app --quiet
          else
            zip RimeoAgent_mac_arm64.zip RimeoAgent --quiet
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: dist/RimeoAgent_mac_arm64.zip

  # build-mac-intel:
  #   Disabled intentionally.
  #   Intel macOS builds are paused to reduce runner queue time and ship only
  #   the Apple Silicon desktop package for the current release line.

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Prepare build metadata
        shell: pwsh
        run: |
          $tagName = $env:GITHUB_REF_NAME
          $buildNumber = [regex]::Match($tagName, '^v1\.0-build(\d+)$').Groups[1].Value
          if ([string]::IsNullOrWhiteSpace($buildNumber)) {
            $buildNumber = $env:GITHUB_RUN_NUMBER
          }
          "VERSION = `"1.0`"`nBUILD_NUMBER = `"$buildNumber`"`nRELEASE_TAG = `"$tagName`"" | Set-Content -Path build_info.py -Encoding utf8

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install "flet==0.28.3" "flet-cli==0.28.3" pyinstaller
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu --quiet

      - name: Create icon
        shell: pwsh
        run: |
          $iconPath = Join-Path $env:RUNNER_TEMP "RimeoAgent.ico"
          python -c "from PIL import Image; img=Image.open('rimeo1024.png').convert('RGBA'); img.save(r'$iconPath', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"
          "ICON_ICO=$iconPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        run: |
          flet pack run.py `
            -y `
            --name RimeoAgent `
            --product-name "Rimeo Agent" `
            --icon "$env:ICON_ICO" `
            --add-data "rimeo1024.png;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "fastapi" `
            --hidden-import "pydantic_settings" `
            --pyinstaller-build-args="--additional-hooks-dir=build/hooks"

      - name: Package
        run: Compress-Archive -Path dist\RimeoAgent.exe -DestinationPath dist\RimeoAgent_win.zip -Force
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist\RimeoAgent_win.zip

  release:
    name: Attach to Release
    needs: [build-mac-arm64, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-arm64/RimeoAgent_mac_arm64.zip
            artifacts/windows/RimeoAgent_win.zip
